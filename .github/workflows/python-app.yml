# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: phantom-seal CI

on:
  push:
    branches: [ master ]
    paths:
      - 'phantom-seal/**'
      - '.github/workflows/python-app.yml'
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: "true"
      CHAIN_ID: "11155111"
      WALLET_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f094538e2d7d2d0f2b2db9d6d7db4f2a6f6f6f6f"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd phantom-seal
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test document
        run: |
          cd phantom-seal
          echo "test document" > test.txt

      - name: Run signer in dry-run
        run: |
          cd phantom-seal
          python signer.py test.txt

      - name: Run verify against generated evidence
        run: |
          cd phantom-seal
          EVIDENCE_FILE=$(ls -t evidence/seal_*.json | head -n 1)
          python verify.py test.txt "$EVIDENCE_FILE"

      - name: Check generated evidence
        run: |
          cd phantom-seal
          ls -la evidence/
