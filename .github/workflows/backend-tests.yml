name: Backend Tests & Quality

on:
  push:
    branches: [master, main, develop]
    paths:
      - "src/api/**"
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    branches: [master, main, develop]
    paths:
      - "src/api/**"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd src/api && poetry install

      - name: Ruff - Code style & linting
        run: |
          cd src/api
          ruff check .
        continue-on-error: true

      - name: Black - Code formatting
        run: |
          cd src/api
          black --check .
        continue-on-error: true

      - name: MyPy - Type checking
        run: |
          cd src/api
          mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Bandit - Security check
        run: |
          cd src/api
          bandit -r . -ll
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: lumina_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd src/api && poetry install

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/lumina_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src/api
          pytest --cov=. --cov-report=xml --cov-report=html --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./src/api/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: lumina_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd src/api && poetry install

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/lumina_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src/api
          pytest -m integration --cov=. --cov-report=xml --cov-fail-under=70

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd src/api && poetry install

      - name: Bandit security scan
        run: |
          cd src/api
          bandit -r . -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: src/api/bandit-report.json
